<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deactivated</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            position: relative;
            font-family: Arial, sans-serif;
        }
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.7);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        section {
            position: absolute;
            top: -50px;
            left: -50px;
            width: calc(100% + 50px);
            height: calc(100% + 50px);
            background: repeating-linear-gradient(#111, #111 50%, white 50%, white);
            background-size: 5px 5px;
            filter: url(#noise);

            opacity: 0%;
            animation-name: fade-in;
            animation-duration: 25s;
            animation-fill-mode: forwards;
            animation-timing-function: linear;

        }
        @keyframes fade-in {
            from {
                opacity: 0%;
            }
            to {
                opacity: 40%;
            }
        }

        svg {
            width: 0;
            height: 0;
            }
    </style>
</head>
<body>
    <div class="background" id="background"></div>
    <div class="login-container">
        <h2>Your account has been deactivated</h2>
        <p>Your access to this service has been revoked.</p>
    </div>
    <section></section>
    <svg>
        <filter id="noise">
            <feTurbulence id="turbulence">
                <animate
                attributeName="baseFrequency"
                dur="300s"
                values="0.9 0.9;0.8 0.8; 0.9 0.9"
                repeatCount="indefinite"
                ></animate>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="60"></feDisplacementMap>
        </filter>
    </svg>
</body>
</html>
